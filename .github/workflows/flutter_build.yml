name: Flutter CI/CD

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        working-directory: ./sartarosh_app
        run: flutter pub get

      - name: Build APK (Release)
        working-directory: ./sartarosh_app
        run: flutter build apk --release --obfuscate --split-debug-info=./build/app/outputs/symbols --no-tree-shake-icons

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sartarosh-Release-APK
          path: sartarosh_app/build/app/outputs/flutter-apk/app-release.apk

      - name: Extract Version
        id: extract_version
        working-directory: ./sartarosh_app
        run: |
          VERSION=$(grep '^version: ' pubspec.yaml | cut -d ' ' -f 2 | cut -d '+' -f 1)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Release and Upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-release-${{ github.run_number }}
          name: Sartarosh App Release ${{ github.run_number }}
          body: "Versiya: ${{ steps.extract_version.outputs.VERSION }}"
          files: sartarosh_app/build/app/outputs/flutter-apk/app-release.apk
          token: ${{ secrets.GITHUB_TOKEN }}
